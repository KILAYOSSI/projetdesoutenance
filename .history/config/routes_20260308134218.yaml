# Routes pour les produits
produits_index:
    path: /produits
    controller: App\Controller\ProductController::index
    methods: [GET]

# Routes spécifiques AVANT la route dynamique {id}
produits_search:
    path: /produits/search
    controller: App\Controller\ProductController::search
    methods: [GET]

produits_vedettes:
    path: /produits/vedettes
    controller: App\Controller\ProductController::featured
    methods: [GET]

produits_categorie:
    path: /produits/categorie/{id}
    controller: App\Controller\ProductController::byCategory
    methods: [GET]
    requirements:
        id: '\d+'

produits_detail:
    path: /produits/{id}
    controller: App\Controller\ProductController::detail
    methods: [GET]
    requirements:
        id: '\d+'

